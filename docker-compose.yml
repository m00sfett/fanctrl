services:
  fanctrl:
    build: .
    container_name: fanctrl
    restart: unless-stopped
    environment:
      - FANCTRL_CONFIG=/config/fanctrl.toml
      - FANCTRL_STATUS_PORT=9101
    volumes:
      - ./config:/config:ro
      - /sys:/sys:ro
    devices:
      - /dev/gpiochip0:/dev/gpiochip0
    networks:
      - webstack_net

networks:
  webstack_net:
    external: true
    name: webstack_net
